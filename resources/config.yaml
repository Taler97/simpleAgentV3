# AgentCore V3 配置文件
# 复制此文件并填写你的 API Key
# 配置优先级: 显式参数 > 环境变量 > 此文件 > 默认值

llm:
  provider: deepseek
  model: deepseek-v4-flash
  api_key: "sk-52577630701048f1a140be141b916ba5"            # 必填: 替换为你的 OpenAI API Key
  base_url: "https://api.deepseek.com"            # 可选: 兼容 OpenAI 格式的代理地址
  temperature: 0.7
  max_tokens: 4096

memory:
  provider: sliding_window
  window_size: 10

runtime:
  pool_size: 4

log_path: logs/agentcore.jsonl
