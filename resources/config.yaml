# AgentCore V3 配置文件
# 复制此文件并填写你的 API Key
# 配置优先级: 显式参数 > 环境变量 > 此文件 > 默认值

llm:
  provider: deepseek
  model: deepseek-v4-flash
  api_key: "sk-52577630701048f1a140be141b916ba5"            # 必填: 替换为你的 OpenAI API Key
  base_url: "https://api.deepseek.com"            # 可选: 兼容 OpenAI 格式的代理地址
  temperature: 0.0
  max_tokens: 4096

session_id: default

system_prompt: |
  你是 AI 助手，通过工具帮助用户。输出 JSON 格式回复。
  action 填工具名，不需要则留空。
  action_input: 当 action 不为空时填工具参数（JSON 字符串）；当 action 为空时，此处填你的回答，不能为空。
  工具列表（仅当需要调用时参考）：{tools_section}

memory:
  provider: sliding_window
  window_size: 10

runtime:
  pool_size: 4

log_path: logs/agentcore.jsonl

